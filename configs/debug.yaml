name: sonarvision-debug
output_dir: ./output/debug
seed: 42

encoder:
  max_depth: 200
  bearing_bins: 128
  patch_size: 16
  embed_dim: 256
  pretrained: ""
  use_dino: false

gct:
  num_layers: 2
  num_heads: 4
  gqa_ratio: 2
  window_size: 8
  mlp_ratio: 2.0
  dropout: 0.0
  max_cache_seq: 64

decoder:
  output_resolution: [128, 172]
  num_upsample_stages: 2
  temporal_refine_layers: 1

supervision:
  depth_sigma: 3.0
  temporal_weight: 0.1
  turbidity_weight: 0.05

data:
  root_dir: ./data
  train_split: 0.8
  num_workers: 0
  sonar_channels: 4

train:
  epochs: 2
  batch_size: 1
  lr: 0.001
  weight_decay: 0.01
  gradient_accumulation: 1
  checkpoint_every: 100
  log_every: 10
  sample_every: 50
  warmup_steps: 50
  resume: ""

deploy:
  target: x86-gpu
  precision: fp32
  max_latency_ms: 500.0
  max_memory_mb: 16384.0
  use_tensorrt: false
  trt_workspace_mb: 2048

water:
  sonar_frequency_khz: 200.0
  default_salinity: 35.0
  default_temperature: 12.0
